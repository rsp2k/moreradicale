# Radicale configuration for RFC 8607 managed attachments testing
# Start server with: python3 -m radicale --config test-attachments-config.ini

[server]
hosts = localhost:5232

[auth]
type = htpasswd
htpasswd_filename = test-attachments-users
htpasswd_encryption = plain

[storage]
filesystem_folder = /tmp/radicale-attachments-test

[attachments]
enabled = True
filesystem_folder = /tmp/radicale-attachments-test/attachments
max_size = 10000000
max_per_resource = 20

[logging]
level = debug
