[server]
hosts = 0.0.0.0:5232

[auth]
type = htpasswd
htpasswd_filename = /config/users
htpasswd_encryption = plain

[rights]
type = allow_read_write

[storage]
filesystem_folder = /tmp/radicale-scheduling-test

[scheduling]
# Enable RFC 6638 CalDAV Scheduling with Email
enabled = True
mode = email
internal_domain = localhost
max_attendees = 100

# Email delivery for external attendees
email_enabled = True
email_dryrun = False
smtp_from_organizer = False
email_subject_prefix = [Calendar]

# Webhook for inbound iTIP (external attendee replies)
webhook_enabled = True
webhook_path = /scheduling/webhook
webhook_secret = test-webhook-secret
webhook_provider = generic
webhook_max_size = 10485760

[hook]
# SMTP configuration for email delivery (MailDev for testing)
smtp_server = maildev
smtp_port = 1025
smtp_security = none
smtp_ssl_verify_mode = NONE
smtp_username =
smtp_password =
from_email = calendar@localhost

[logging]
level = debug
response_content_on_debug = True
request_content_on_debug = True
request_header_on_debug = True
response_header_on_debug = True
