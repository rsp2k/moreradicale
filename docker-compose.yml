services:
  maildev:
    image: maildev/maildev:latest
    container_name: maildev-smtp-test
    ports:
      - "8025:1080"  # Web UI
      - "1025:1025"  # SMTP
    networks:
      - default
    restart: unless-stopped
    environment:
      - MAILDEV_WEB_PORT=1080
      - MAILDEV_SMTP_PORT=1025

  radicale:
    build:
      context: .
      dockerfile: Dockerfile
    image: radicale-rfc6638:latest
    container_name: radicale-rfc6638-test
    volumes:
      - ./test-scheduling-config.ini:/config/config:ro
      - ./test-users:/config/users:ro
      - ./test-rights.conf:/config/rights:ro
      - radicale-data:/data
    ports:
      - "5232:5232"
    networks:
      - caddy
      - default
    labels:
      caddy: radicale-testing.l.supported.systems
      caddy.reverse_proxy: "{{upstreams 5232}}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5232/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    environment:
      - TZ=UTC
    depends_on:
      - maildev

networks:
  caddy:
    external: true

volumes:
  radicale-data:
    driver: local
