services:
  moreradicale:
    build:
      context: .
      dockerfile: Dockerfile
    image: moreradicale:${IMAGE_TAG:-latest}
    container_name: ${COMPOSE_PROJECT_NAME}
    restart: unless-stopped
    networks:
      - caddy
    volumes:
      - moreradicale-data:/var/lib/moreradicale/collections
      - ./config.docker:/etc/moreradicale/config:ro
      - ./users:/etc/moreradicale/users:ro
    environment:
      TZ: ${TZ:-UTC}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://127.0.0.1:5232/.web/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    labels:
      caddy: ${DOMAIN}
      caddy.reverse_proxy: "{{upstreams 5232}}"
      caddy.encode: gzip zstd
      # WebSocket sync (/.websync) needs long-lived streams - keep peer-service defaults
      caddy.reverse_proxy.flush_interval: "-1"
      caddy.reverse_proxy.transport: "http"
      caddy.reverse_proxy.transport.read_timeout: "0"
      caddy.reverse_proxy.transport.write_timeout: "0"
      caddy.reverse_proxy.transport.keepalive: "5m"
      caddy.reverse_proxy.transport.keepalive_idle_conns: "10"
      caddy.reverse_proxy.stream_timeout: "24h"
      caddy.reverse_proxy.stream_close_delay: "5s"

networks:
  caddy:
    external: true

volumes:
  moreradicale-data:
    driver: local
