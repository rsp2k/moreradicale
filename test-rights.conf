# Test rights configuration - allow all access for testing
# WARNING: Only use for testing, not production!
# user: .* matches any username (including authenticated users)
# user: (empty) matches anonymous users
# permissions: R=read calendar, r=read item, W=write calendar, w=write item

[allow-any-user]
user: .*
collection: .*
permissions: RrWw

[allow-anonymous]
user:
collection: .*
permissions: RrWw
