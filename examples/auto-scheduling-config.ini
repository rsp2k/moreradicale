# Radicale Auto-Scheduling Configuration Example
# This demonstrates RFC 6638 SCHEDULE-AGENT=SERVER auto-scheduling for resources

[server]
hosts = 0.0.0.0:5232

[auth]
type = htpasswd
htpasswd_filename = /etc/radicale/users
htpasswd_encryption = bcrypt

[storage]
filesystem_folder = /var/lib/radicale/collections

[scheduling]
# Enable CalDAV scheduling
enabled = True
internal_domain = example.com

# Default auto-accept policy for all resources
# Options: always, if-free, manual, tentative-if-conflict
auto_accept_policy = if-free

# Per-resource policy overrides (optional)
# This allows fine-grained control over each resource's behavior
resource_policies_file = /etc/radicale/resource-policies.json

# Email delivery for external attendees (optional)
email_enabled = True
email_dryrun = False

# Maximum attendees per event
max_attendees = 100

[hook]
# SMTP configuration for email delivery
smtp_server = smtp.example.com
smtp_port = 587
smtp_use_tls = True
smtp_username = noreply@example.com
smtp_password = your-smtp-password
smtp_from = noreply@example.com

[logging]
level = info
