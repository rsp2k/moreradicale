### Proxy Forward to local running "moreradicale" server
###
### Usual configuration file location: /etc/nginx/default.d/

## "well-known" redirect at least for Apple devices
rewrite ^/.well-known/carddav /moreradicale/ redirect;
rewrite ^/.well-known/caldav /moreradicale/ redirect;

## Base URI: /moreradicale/
location /moreradicale/ {
    proxy_pass        http://localhost:5232;
    proxy_set_header  X-Script-Name /moreradicale;
    proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header  X-Forwarded-Host $host;
    proxy_set_header  X-Forwarded-Port $server_port;
    proxy_set_header  X-Forwarded-Proto $scheme;
    proxy_set_header  Host $http_host;
    proxy_pass_header Authorization;
}

