[server]
hosts = 0.0.0.0:5232

[auth]
type = htpasswd
htpasswd_filename = test-sharing-users
htpasswd_encryption = plain

[rights]
# Use the sharing-aware rights backend
type = owner_only_shared

[storage]
filesystem_folder = /tmp/radicale-sharing-test

[sharing]
# Enable calendar sharing and delegation
enabled = True
delegation_enabled = True

[scheduling]
# Enable scheduling for delegation tests
enabled = True
mode = internal
internal_domain = localhost

[logging]
level = debug
